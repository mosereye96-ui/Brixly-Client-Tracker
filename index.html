<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brixly Client Tracker</title>
<style>
  :root {
    --paper: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --ink: #f0ede8;
    --muted: #888888;
    --accent: #c1502e;
    --accent-light: #e8673d;
    --gold: #d4a843;
    --green: #52b788;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  h1 { font-family: Georgia, serif; font-size: 26px; margin-bottom: 4px; }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

  .top-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 20px; flex: 1; min-width: 140px;
  }
  .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .stat-card .value { font-family: Georgia, serif; font-size: 26px; font-weight: 700; }
  .stat-card .value.gold { color: var(--gold); }
  .stat-card .value.green { color: var(--green); }

  .btn {
    background: var(--accent); color: white; border: none; padding: 10px 18px;
    border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px;
  }
  .btn:hover { background: var(--accent-light); }
  .btn.secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--ink); }
  .btn.small { padding: 6px 12px; font-size: 12px; }
  .btn.danger { background: transparent; border: 1px solid #713b2e; color: #e0836a; }

  .client-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
  .client-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; cursor: pointer; transition: border-color 0.15s;
  }
  .client-card:hover { border-color: var(--accent); }
  .client-card.selected { border-color: var(--gold); }
  .client-head { display: flex; justify-content: space-between; align-items: center; }
  .client-name { font-weight: 700; font-size: 16px; }
  .client-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .client-stats { display: flex; gap: 20px; margin-top: 10px; font-size: 13px; }
  .client-stats .stat b { color: var(--gold); }

  .badge {
    font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 3px 8px;
    border-radius: 4px; letter-spacing: 0.04em;
  }
  .badge.paid { background: rgba(82,183,136,0.15); color: var(--green); }
  .badge.due { background: rgba(212,168,67,0.15); color: var(--gold); }
  .badge.overdue { background: rgba(193,80,46,0.15); color: var(--accent-light); }

  .detail-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; margin-top: 16px;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .form-group input, .form-group select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--ink);
    padding: 8px 10px; border-radius: 6px; font-size: 14px;
  }
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; width: 90%; max-width: 460px; max-height: 85vh; overflow-y: auto;
  }
  .modal h3 { font-family: Georgia, serif; margin-bottom: 16px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .chart-wrap { position: relative; height: 220px; margin-top: 16px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--muted); }
  .tab.active { background: var(--surface2); color: var(--ink); }
  .log-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .log-row:last-child { border-bottom: none; }
  .close-x { cursor: pointer; color: var(--muted); font-size: 20px; float: right; }
</style>
</head>
<body>

<h1>Brix<span>ly</span> Client Tracker</h1>
<p class="sub">Track review growth, taps/scans, and visit history per client</p>

<div class="top-row" id="statsRow"></div>

<div class="detail-panel" style="margin-bottom:24px;">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2 style="font-size:16px; font-family:Georgia,serif;">MRR growth</h2>
  </div>
  <div class="chart-wrap" style="height:180px;">
    <canvas id="mrrChart" role="img" aria-label="Line chart showing monthly recurring revenue growth over time"></canvas>
  </div>
</div>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:12px; flex-wrap:wrap;">
  <h2 style="font-size:16px;">Clients</h2>
  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
    <input type="text" id="clientSearch" placeholder="Search clients..." oninput="handleSearch()"
      style="background:var(--surface2); border:1px solid var(--border); color:var(--ink); padding:8px 10px; border-radius:6px; font-size:13px;">
    <button class="btn secondary small" onclick="exportData()">Backup</button>
    <button class="btn secondary small" onclick="document.getElementById('importFile').click()">Restore</button>
    <input type="file" id="importFile" accept="application/json" style="display:none;" onchange="importData(event)">
    <button class="btn" onclick="openAddClientModal()">+ Add client</button>
  </div>
</div>

<div class="client-list" id="clientList"></div>

<div id="detailPanel"></div>

<!-- Add Client Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <span class="close-x" onclick="closeModal('addModal')">&times;</span>
    <h3 id="clientModalTitle">Add new client</h3>
    <div class="form-group" style="margin-bottom:12px;">
      <label>Business name</label>
      <input type="text" id="newBizName" placeholder="Maria's Salon">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Business type</label>
        <input type="text" id="newBizType" placeholder="Salon">
      </div>
      <div class="form-group">
        <label>Onboarded date</label>
        <input type="date" id="newOnboardDate">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Starting review count</label>
        <input type="number" id="newBaselineReviews" placeholder="25">
      </div>
      <div class="form-group">
        <label>Monthly rate ($)</label>
        <input type="number" id="newMonthlyRate" placeholder="149">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:16px;">
      <label>Short.io link slug</label>
      <input type="text" id="newSlug" placeholder="mariasalon">
    </div>
    <div class="form-group" style="margin-bottom:16px;">
      <label>Products given</label>
      <div id="productChecklist" style="display:flex; flex-direction:column; gap:8px; margin-top:6px;">
        <!-- populated by JS -->
      </div>
    </div>
    <button class="btn" id="clientModalBtn" style="width:100%;" onclick="addClient()">Add client</button>
  </div>
</div>

<!-- Add Check-in Modal -->
<div class="modal-overlay" id="checkinModal">
  <div class="modal">
    <span class="close-x" onclick="closeModal('checkinModal')">&times;</span>
    <h3>Log monthly check-in</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Visit date</label>
        <input type="date" id="ciDate">
      </div>
      <div class="form-group">
        <label>Current review count</label>
        <input type="number" id="ciReviews" placeholder="34">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Taps + scans this month</label>
        <input type="number" id="ciTaps" placeholder="42">
      </div>
      <div class="form-group">
        <label>Payment status</label>
        <select id="ciPayment">
          <option value="paid">Paid</option>
          <option value="due">Due</option>
          <option value="overdue">Overdue</option>
        </select>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:16px;">
      <label>Notes (optional)</label>
      <input type="text" id="ciNotes" placeholder="Uploaded 5 new photos, GBP looking good">
    </div>
    <button class="btn" style="width:100%;" onclick="saveCheckin()">Save check-in</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let clients = [];
let selectedClientId = null;
let chartInstance = null;
let mrrChartInstance = null;
let editingClientId = null;
let searchQuery = '';

async function loadData() {
  try {
    const raw = localStorage.getItem('brixly_clients');
    clients = raw ? JSON.parse(raw) : [];
  } catch (e) {
    clients = [];
  }
  render();
}

async function saveData() {
  try {
    localStorage.setItem('brixly_clients', JSON.stringify(clients));
  } catch (e) {
    console.error('Save failed', e);
  }
}

function uid() { return 'c_' + Date.now() + '_' + Math.floor(Math.random()*1000); }

function parseIntOrDefault(value, fallback) {
  if (value === '' || value === null || value === undefined) return fallback;
  const n = parseInt(value);
  return isNaN(n) ? fallback : n;
}

const PRODUCT_CATALOG = [
  { id: 'nfc_stand', label: 'NFC countertop stand' },
  { id: 'badge_reel', label: 'Retractable badge reel' },
  { id: 'gbp_opt', label: 'GBP optimization' },
  { id: 'ai_review_responses', label: 'AI-assisted review responses' },
  { id: 'photo_uploads', label: 'Monthly photo uploads' },
  { id: 'monthly_reporting', label: 'Monthly reporting' }
];

function getSelectedProducts() {
  return PRODUCT_CATALOG
    .map(p => p.id)
    .filter(id => document.getElementById('prod_' + id) && document.getElementById('prod_' + id).checked);
}

function exportData() {
  const blob = new Blob([JSON.stringify(clients, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `brixly-clients-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('Invalid file format');
      const doMerge = clients.length > 0 && confirm(
        'You already have clients saved. Click OK to MERGE the backup with existing clients, or Cancel to REPLACE existing clients with the backup.'
      );
      if (doMerge) {
        const existingIds = new Set(clients.map(c => c.id));
        imported.forEach(c => { if (!existingIds.has(c.id)) clients.push(c); });
      } else {
        clients = imported;
      }
      await saveData();
      render();
      if (selectedClientId && !clients.find(c => c.id === selectedClientId)) {
        selectedClientId = null;
        document.getElementById('detailPanel').innerHTML = '';
      }
      alert('Backup restored successfully.');
    } catch (err) {
      alert('Could not read that file. Make sure it\'s a Brixly backup JSON file.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function renderProductChecklist(selectedIds) {
  const sel = selectedIds || [];
  const container = document.getElementById('productChecklist');
  container.innerHTML = PRODUCT_CATALOG.map(p => `
    <label style="display:flex; align-items:center; gap:8px; font-size:13px; font-weight:400; text-transform:none; letter-spacing:normal; color:var(--ink); cursor:pointer;">
      <input type="checkbox" id="prod_${p.id}" ${sel.includes(p.id) ? 'checked' : ''} style="width:16px; height:16px;">
      ${p.label}
    </label>
  `).join('');
}

function openAddClientModal() {
  editingClientId = null;
  document.getElementById('clientModalTitle').textContent = 'Add new client';
  document.getElementById('clientModalBtn').textContent = 'Add client';
  document.getElementById('newBizName').value = '';
  document.getElementById('newBizType').value = '';
  document.getElementById('newOnboardDate').value = '';
  document.getElementById('newBaselineReviews').value = '';
  document.getElementById('newMonthlyRate').value = '';
  document.getElementById('newSlug').value = '';
  renderProductChecklist([]);
  openModal('addModal');
}

function openEditClientModal(clientId, event) {
  if (event) event.stopPropagation();
  const client = clients.find(c => c.id === clientId);
  if (!client) return;
  editingClientId = clientId;
  document.getElementById('clientModalTitle').textContent = 'Edit client';
  document.getElementById('clientModalBtn').textContent = 'Save changes';
  document.getElementById('newBizName').value = client.name;
  document.getElementById('newBizType').value = client.type;
  document.getElementById('newOnboardDate').value = client.onboardDate;
  document.getElementById('newBaselineReviews').value = client.baselineReviews;
  document.getElementById('newMonthlyRate').value = client.monthlyRate;
  document.getElementById('newSlug').value = client.slug;
  renderProductChecklist(client.products || []);
  openModal('addModal');
}

async function addClient() {
  const name = document.getElementById('newBizName').value.trim();
  if (!name) return;

  if (editingClientId) {
    const client = clients.find(c => c.id === editingClientId);
    if (client) {
      client.name = name;
      client.type = document.getElementById('newBizType').value.trim() || 'Business';
      client.onboardDate = document.getElementById('newOnboardDate').value || client.onboardDate;
      client.baselineReviews = parseIntOrDefault(document.getElementById('newBaselineReviews').value, 0);
      client.monthlyRate = parseIntOrDefault(document.getElementById('newMonthlyRate').value, 149);
      client.slug = document.getElementById('newSlug').value.trim();
      client.products = getSelectedProducts();
    }
    editingClientId = null;
  } else {
    const client = {
      id: uid(),
      name: name,
      type: document.getElementById('newBizType').value.trim() || 'Business',
      onboardDate: document.getElementById('newOnboardDate').value || new Date().toISOString().split('T')[0],
      baselineReviews: parseIntOrDefault(document.getElementById('newBaselineReviews').value, 0),
      monthlyRate: parseIntOrDefault(document.getElementById('newMonthlyRate').value, 149),
      slug: document.getElementById('newSlug').value.trim(),
      products: getSelectedProducts(),
      checkins: []
    };
    clients.push(client);
  }

  await saveData();
  closeModal('addModal');
  document.getElementById('newBizName').value = '';
  document.getElementById('newBizType').value = '';
  document.getElementById('newOnboardDate').value = '';
  document.getElementById('newBaselineReviews').value = '';
  document.getElementById('newMonthlyRate').value = '';
  document.getElementById('newSlug').value = '';
  render();
  if (selectedClientId) showDetail(selectedClientId);
}

function openCheckinModal(clientId) {
  selectedClientId = clientId;
  document.getElementById('ciDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('ciReviews').value = '';
  document.getElementById('ciTaps').value = '';
  document.getElementById('ciNotes').value = '';
  openModal('checkinModal');
}

async function saveCheckin() {
  const client = clients.find(c => c.id === selectedClientId);
  if (!client) return;
  const checkin = {
    date: document.getElementById('ciDate').value,
    reviews: parseInt(document.getElementById('ciReviews').value) || 0,
    taps: parseInt(document.getElementById('ciTaps').value) || 0,
    payment: document.getElementById('ciPayment').value,
    notes: document.getElementById('ciNotes').value.trim()
  };
  client.checkins.push(checkin);
  client.checkins.sort((a,b) => new Date(a.date) - new Date(b.date));
  await saveData();
  closeModal('checkinModal');
  render();
  showDetail(selectedClientId);
}

async function deleteClient(clientId, event) {
  event.stopPropagation();
  if (!confirm('Remove this client? This cannot be undone.')) return;
  clients = clients.filter(c => c.id !== clientId);
  if (selectedClientId === clientId) {
    selectedClientId = null;
    document.getElementById('detailPanel').innerHTML = '';
  }
  await saveData();
  render();
}

function latestCheckin(client) {
  return client.checkins.length ? client.checkins[client.checkins.length - 1] : null;
}

function daysSinceLastActivity(client) {
  const last = latestCheckin(client);
  const refDate = last ? last.date : client.onboardDate;
  if (!refDate) return null;
  const diffMs = new Date().setHours(0,0,0,0) - new Date(refDate + 'T00:00:00').getTime();
  return Math.floor(diffMs / (1000 * 60 * 60 * 24));
}

function isOverdueForCheckin(client) {
  const days = daysSinceLastActivity(client);
  return days !== null && days >= 30;
}

function currentReviews(client) {
  const last = latestCheckin(client);
  return last ? last.reviews : client.baselineReviews;
}

function reviewGrowth(client) {
  return currentReviews(client) - client.baselineReviews;
}

function totalTaps(client) {
  return client.checkins.reduce((sum, c) => sum + (c.taps || 0), 0);
}

function renderStats() {
  const totalClients = clients.length;
  const totalGrowth = clients.reduce((sum, c) => sum + reviewGrowth(c), 0);
  const totalTapsAll = clients.reduce((sum, c) => sum + totalTaps(c), 0);
  const mrr = clients.reduce((sum, c) => sum + (c.monthlyRate || 0), 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="label">Clients</div>
      <div class="value">${totalClients}</div>
    </div>
    <div class="stat-card">
      <div class="label">Reviews gained</div>
      <div class="value gold">+${totalGrowth}</div>
    </div>
    <div class="stat-card">
      <div class="label">Total taps/scans</div>
      <div class="value green">${totalTapsAll}</div>
    </div>
    <div class="stat-card">
      <div class="label">Monthly revenue</div>
      <div class="value">$${mrr}</div>
    </div>
  `;
}

function handleSearch() {
  searchQuery = document.getElementById('clientSearch').value.trim().toLowerCase();
  renderClientList();
}

function renderClientList() {
  const listEl = document.getElementById('clientList');
  const filtered = searchQuery
    ? clients.filter(c => c.name.toLowerCase().includes(searchQuery) || c.type.toLowerCase().includes(searchQuery))
    : clients;

  if (clients.length === 0) {
    listEl.innerHTML = `<div class="empty-state">No clients yet. Add your first one to start tracking progress.</div>`;
    return;
  }
  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty-state">No clients match "${escapeHtml(searchQuery)}".</div>`;
    return;
  }
  listEl.innerHTML = filtered.map(c => {
    const last = latestCheckin(c);
    const growth = reviewGrowth(c);
    const paymentBadge = last ? `<span class="badge ${last.payment}">${last.payment}</span>` : `<span class="badge due">no check-in yet</span>`;
    const overdueBadge = isOverdueForCheckin(c) ? `<span class="badge overdue">check-in overdue</span>` : '';
    return `
      <div class="client-card ${c.id === selectedClientId ? 'selected' : ''}" onclick="showDetail('${c.id}')">
        <div class="client-head">
          <div>
            <div class="client-name">${escapeHtml(c.name)}</div>
            <div class="client-meta">${escapeHtml(c.type)} &middot; onboarded ${formatDate(c.onboardDate)}</div>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            ${overdueBadge}
            ${paymentBadge}
            <button class="btn secondary small" onclick="openEditClientModal('${c.id}', event)">Edit</button>
            <button class="btn danger small" onclick="deleteClient('${c.id}', event)">Remove</button>
          </div>
        </div>
        <div class="client-stats">
          <div class="stat">Reviews: <b>${currentReviews(c)}</b> (${growth >= 0 ? '+' : ''}${growth} since start)</div>
          <div class="stat">Taps/scans: <b>${totalTaps(c)}</b> total</div>
          <div class="stat">$${c.monthlyRate}/mo</div>
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function showDetail(clientId) {
  selectedClientId = clientId;
  renderClientList();
  const client = clients.find(c => c.id === clientId);
  if (!client) return;

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="detail-panel">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="font-family:Georgia,serif;">${escapeHtml(client.name)}</h2>
        <button class="btn" onclick="openCheckinModal('${client.id}')">+ Log check-in</button>
      </div>
      <p style="color:var(--muted); font-size:13px; margin-top:4px;">
        Started with ${client.baselineReviews} reviews on ${formatDate(client.onboardDate)}
        ${client.slug ? ' &middot; brixly.s.gy/' + escapeHtml(client.slug) : ''}
      </p>
      <div class="chart-wrap">
        <canvas id="growthChart" role="img" aria-label="Line chart showing review count growth over time for ${escapeHtml(client.name)}"></canvas>
      </div>
      <h3 style="font-size:14px; margin-top:20px; margin-bottom:8px; color:var(--muted);">Products given</h3>
      <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px;">
        ${(client.products && client.products.length)
          ? client.products.map(id => {
              const p = PRODUCT_CATALOG.find(x => x.id === id);
              return `<span class="badge paid">${p ? escapeHtml(p.label) : id}</span>`;
            }).join('')
          : '<p style="color:var(--muted); font-size:13px;">No products assigned yet &mdash; click Edit to add some.</p>'
        }
      </div>
      <h3 style="font-size:14px; margin-top:20px; margin-bottom:8px; color:var(--muted);">Check-in history</h3>
      <div id="checkinHistory">
        ${client.checkins.length === 0 ? '<p style="color:var(--muted); font-size:13px;">No check-ins logged yet.</p>' :
          [...client.checkins].reverse().map(ci => `
            <div class="log-row">
              <span>${formatDate(ci.date)} ${ci.notes ? '&mdash; ' + escapeHtml(ci.notes) : ''}</span>
              <span>${ci.reviews} reviews &middot; ${ci.taps} taps &middot; <span class="badge ${ci.payment}">${ci.payment}</span></span>
            </div>
          `).join('')
        }
      </div>
    </div>
  `;

  renderChart(client);
}

function renderChart(client) {
  const ctx = document.getElementById('growthChart');
  if (!ctx) return;
  if (chartInstance) chartInstance.destroy();

  const labels = ['Start', ...client.checkins.map(ci => formatDate(ci.date))];
  const data = [client.baselineReviews, ...client.checkins.map(ci => ci.reviews)];

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Review count',
        data: data,
        borderColor: '#d4a843',
        backgroundColor: 'rgba(212,168,67,0.1)',
        fill: true,
        tension: 0.3,
        pointBackgroundColor: '#d4a843',
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#888888' }, grid: { color: '#222222' } },
        y: { ticks: { color: '#888888' }, grid: { color: '#222222' }, beginAtZero: false }
      }
    }
  });
}

function renderMrrChart() {
  const ctx = document.getElementById('mrrChart');
  if (!ctx) return;
  if (mrrChartInstance) mrrChartInstance.destroy();

  if (clients.length === 0) return;

  const dated = clients
    .filter(c => c.onboardDate)
    .map(c => ({ date: c.onboardDate, rate: c.monthlyRate || 0 }))
    .sort((a, b) => new Date(a.date) - new Date(b.date));

  if (dated.length === 0) return;

  // Build cumulative MRR at each month from first onboarding to current month
  const start = new Date(dated[0].date + 'T00:00:00');
  const now = new Date();
  const months = [];
  let cursor = new Date(start.getFullYear(), start.getMonth(), 1);
  const end = new Date(now.getFullYear(), now.getMonth(), 1);
  while (cursor <= end) {
    months.push(new Date(cursor));
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
  }

  const labels = months.map(m => m.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
  const data = months.map(m => {
    const cutoff = new Date(m.getFullYear(), m.getMonth() + 1, 1);
    return dated.filter(d => new Date(d.date + 'T00:00:00') < cutoff).reduce((sum, d) => sum + d.rate, 0);
  });

  mrrChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'MRR',
        data: data,
        borderColor: '#52b788',
        backgroundColor: 'rgba(82,183,136,0.1)',
        fill: true,
        tension: 0.3,
        pointBackgroundColor: '#52b788',
        pointRadius: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: (ctx) => '$' + ctx.parsed.y } }
      },
      scales: {
        x: { ticks: { color: '#888888' }, grid: { color: '#222222' } },
        y: { ticks: { color: '#888888', callback: (v) => '$' + v }, grid: { color: '#222222' }, beginAtZero: true }
      }
    }
  });
}

function render() {
  renderStats();
  renderClientList();
  renderMrrChart();
}

loadData();
</script>
</body>
</html>
